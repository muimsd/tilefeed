[database]
host = "localhost"
port = 5432
user = "postgres"
password = "postgres"
dbname = "tilefeed_example"

[updates]
debounce_ms = 500
worker_concurrency = 4

[publish]
backend = "s3"
destination = "s3://my-tiles-bucket/basemap/tiles.mbtiles"
publish_on_generate = true
publish_on_update = true

[[sources]]
name = "basemap"
mbtiles_path = "./examples/s3-publish/basemap.mbtiles"
min_zoom = 0
max_zoom = 14

[sources.tippecanoe]
drop_densest_as_needed = true
no_tile_size_limit = true

[[sources.layers]]
name = "buildings"
schema = "public"
table = "buildings"
geometry_column = "geom"
id_column = "id"
srid = 4326
properties = ["name", "type"]
