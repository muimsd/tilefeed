[database]
host = "localhost"
port = 5432
user = "postgres"
password = "postgres"
dbname = "geodata"
pool_size = 4

[updates]
debounce_ms = 200
worker_concurrency = 8

[publish]
backend = "none" # "none", "local", "s3", "command"
# destination = "/tmp/tiles.mbtiles"   # for local
# destination = "s3://bucket/tiles.mbtiles" # for s3
# args = ["--endpoint-url", "https://s3.us-east-1.amazonaws.com"] # optional for s3
# command = "rclone copy \"$POSTILE_MBTILES_PATH\" remote:tiles/tiles.mbtiles" # for command backend
publish_on_generate = true
publish_on_update = true

[[sources]]
name = "basemap"
mbtiles_path = "./basemap.mbtiles"
min_zoom = 0
max_zoom = 14

[[sources.layers]]
name = "buildings"
schema = "public"
table = "buildings"
geometry_column = "geom"
id_column = "id"
srid = 4326
properties = ["name", "type", "height"]
