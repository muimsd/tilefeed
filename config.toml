# Path to Tippecanoe binary (default: "tippecanoe", resolved via PATH)
# tippecanoe_bin = "/usr/local/bin/tippecanoe"

[database]
host = "localhost"
port = 5432
user = "postgres"
password = "postgres"
dbname = "geodata"
pool_size = 4

[updates]
debounce_ms = 200
worker_concurrency = 8

[publish]
backend = "none" # "none", "local", "s3", "mapbox", "command"
# destination = "/tmp/tiles.mbtiles"   # for local
# destination = "s3://bucket/tiles.mbtiles" # for s3
# args = ["--endpoint-url", "https://s3.us-east-1.amazonaws.com"] # optional for s3
# mapbox_tileset_id = "your-username.tileset-name" # for mapbox (requires aws CLI)
# mapbox_token = "sk.eyJ1Ijoi..."                  # Mapbox secret token with uploads:write scope
# command = "rclone copy \"$TILEFEED_MBTILES_PATH\" remote:tiles/tiles.mbtiles" # for command backend
publish_on_generate = true
publish_on_update = true

# [webhook]
# urls = ["https://example.com/hooks/tilefeed"]
# secret = "my-signing-secret"           # HMAC-SHA256 signing (optional)
# cooldown_secs = 300                    # aggregate events per source for 5 minutes (optional)
# timeout_ms = 5000                      # per-request timeout (default: 5000)
# retry_count = 2                        # retries with exponential backoff (default: 2)
# on_generate = true                     # notify on full generation (default: true)
# on_update = true                       # notify on incremental updates (default: true)

[[sources]]
name = "basemap"
mbtiles_path = "./basemap.mbtiles"
min_zoom = 0
max_zoom = 14

# Tippecanoe fine-tuning (all optional, sensible defaults apply)
[sources.tippecanoe]
# Feature dropping strategies (pick one or combine as needed)
# drop_densest_as_needed = true
# drop_fraction_as_needed = true
# drop_smallest_as_needed = true
# coalesce_densest_as_needed = true
# extend_zooms_if_still_dropping = true

# Drop rate control
# drop_rate = 2.5        # rate features are dropped at lower zooms
# base_zoom = 14         # base zoom for drop rate calculation

# Detail and simplification
# simplification = 10.0  # simplification factor in tile units
# detect_shared_borders = true
# no_tiny_polygon_reduction = true

# Tile limits
no_tile_size_limit = true     # default: true (set false for 500KB limit)
# no_feature_limit = true     # remove 200,000 feature-per-tile limit
# no_tile_compression = true  # skip gzip compression of PBF tiles

# Geometry tuning
# buffer = 5             # pixel buffer around each tile edge
# full_detail = 12       # detail at max zoom (4096 coordinate units)
# low_detail = 12        # detail at lower zooms
# minimum_detail = 7     # detail below which features are dropped

# Escape hatch: pass any extra arguments directly to Tippecanoe
# extra_args = ["--cluster-distance=10", "--accumulate-attribute=count:sum"]

[[sources.layers]]
name = "buildings"
schema = "public"
table = "buildings"
geometry_column = "geom"
id_column = "id"
srid = 4326
properties = ["name", "type", "height"]
