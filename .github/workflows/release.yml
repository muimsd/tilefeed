name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: postile
            archive: postile-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: postile
            archive: postile-aarch64-unknown-linux-gnu.tar.gz
            cross: true
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: postile
            archive: postile-aarch64-apple-darwin.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: postile
            archive: postile-x86_64-apple-darwin.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: postile.exe
            archive: postile-x86_64-pc-windows-msvc.zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install cross-compilation tools
        if: matrix.cross
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Install protoc (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protoc (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y
      - name: Configure cross-compilation
        if: matrix.cross
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: tar czf ${{ matrix.archive }} -C target/${{ matrix.target }}/release ${{ matrix.artifact }}
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/${{ matrix.target }}/release/${{ matrix.artifact }} -DestinationPath ${{ matrix.archive }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  package-deb:
    name: Build .deb (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            cross: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          cargo install cargo-deb
      - name: Install cross-compilation tools
        if: matrix.cross
        run: sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: Configure cross-compilation
        if: matrix.cross
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build .deb package
        run: cargo deb --target ${{ matrix.target }}
      - name: Rename .deb
        run: |
          DEB=$(find target/${{ matrix.target }}/debian -name '*.deb' | head -1)
          cp "$DEB" postile_${{ matrix.arch }}.deb
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: postile_${{ matrix.arch }}.deb
          path: postile_${{ matrix.arch }}.deb

  package-rpm:
    name: Build .rpm (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler
          cargo install cargo-generate-rpm
      - name: Build release binary
        run: cargo build --release
      - name: Build .rpm package
        run: cargo generate-rpm
      - name: Rename .rpm
        run: |
          RPM=$(find target/generate-rpm -name '*.rpm' | head -1)
          cp "$RPM" postile-x86_64.rpm
      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: postile-x86_64.rpm
          path: postile-x86_64.rpm

  release:
    name: Create Release
    needs: [build, package-deb, package-rpm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  update-manifests:
    name: Update Package Manifests
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Download release assets and compute checksums
        run: |
          VERSION=${{ steps.version.outputs.version }}
          BASE_URL="https://github.com/muimsd/postile/releases/download/v${VERSION}"
          for target in aarch64-apple-darwin x86_64-apple-darwin x86_64-unknown-linux-gnu; do
            curl -sL "${BASE_URL}/postile-${target}.tar.gz" -o "postile-${target}.tar.gz"
            sha256sum "postile-${target}.tar.gz" >> checksums.txt
          done
          curl -sL "${BASE_URL}/postile-x86_64-pc-windows-msvc.zip" -o postile-windows.zip
          sha256sum postile-windows.zip >> checksums.txt
          cat checksums.txt
      - name: Update Homebrew formula
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA_ARM=$(grep aarch64-apple-darwin checksums.txt | awk '{print $1}')
          SHA_INTEL=$(grep x86_64-apple-darwin checksums.txt | awk '{print $1}')
          SHA_LINUX=$(grep x86_64-unknown-linux-gnu checksums.txt | awk '{print $1}')
          cat > Formula/postile.rb <<EOF
          class Postile < Formula
            desc "PostGIS vector tile pipeline with incremental MBTiles updates via LISTEN/NOTIFY"
            homepage "https://github.com/muimsd/postile"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/muimsd/postile/releases/download/v${VERSION}/postile-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM}"
              end
              on_intel do
                url "https://github.com/muimsd/postile/releases/download/v${VERSION}/postile-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_INTEL}"
              end
            end

            on_linux do
              url "https://github.com/muimsd/postile/releases/download/v${VERSION}/postile-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "postile"
            end

            test do
              assert_match "postile", shell_output("\#{bin}/postile --help")
            end
          end
          EOF
          sed -i 's/^          //' Formula/postile.rb
      - name: Update Scoop manifest
        run: |
          VERSION=${{ steps.version.outputs.version }}
          SHA_WIN=$(grep windows checksums.txt | awk '{print $1}')
          cat > bucket/postile.json <<EOF
          {
              "version": "${VERSION}",
              "description": "PostGIS vector tile pipeline with incremental MBTiles updates via LISTEN/NOTIFY",
              "homepage": "https://github.com/muimsd/postile",
              "license": "MIT",
              "architecture": {
                  "64bit": {
                      "url": "https://github.com/muimsd/postile/releases/download/v${VERSION}/postile-x86_64-pc-windows-msvc.zip",
                      "hash": "${SHA_WIN}"
                  }
              },
              "bin": "postile.exe",
              "checkver": {
                  "github": "https://github.com/muimsd/postile"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/muimsd/postile/releases/download/v\$version/postile-x86_64-pc-windows-msvc.zip"
                      }
                  }
              }
          }
          EOF
          sed -i 's/^          //' bucket/postile.json
      - name: Commit and push manifest updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/postile.rb bucket/postile.json
          git commit -m "Update package manifests for v${{ steps.version.outputs.version }}"
          git push

  publish-chocolatey:
    name: Publish to Chocolatey
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Download Windows asset and compute checksum
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $url = "https://github.com/muimsd/postile/releases/download/v${version}/postile-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile postile.zip
          $hash = (Get-FileHash postile.zip -Algorithm SHA256).Hash
          echo "sha=$hash" >> $env:GITHUB_OUTPUT
        id: checksum
      - name: Prepare Chocolatey package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $sha = "${{ steps.checksum.outputs.sha }}"
          Copy-Item -Recurse packaging/chocolatey choco-pkg
          (Get-Content choco-pkg/postile.nuspec) -replace '0.1.0', $version | Set-Content choco-pkg/postile.nuspec
          (Get-Content choco-pkg/tools/chocolateyinstall.ps1) -replace '__CHECKSUM__', $sha | Set-Content choco-pkg/tools/chocolateyinstall.ps1
      - name: Build and push Chocolatey package
        shell: pwsh
        run: |
          cd choco-pkg
          choco pack
          choco push postile.${{ steps.version.outputs.version }}.nupkg --source https://push.chocolatey.org/ --api-key ${{ secrets.CHOCOLATEY_API_KEY }}

  publish-winget:
    name: Submit to winget
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
      - name: Submit to winget-pkgs
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: muimsd.postile
          version: ${{ steps.version.outputs.version }}
          installers-regex: postile-x86_64-pc-windows-msvc\.zip$
          token: ${{ secrets.WINGET_TOKEN }}
